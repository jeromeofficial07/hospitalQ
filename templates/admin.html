<script>
    /* ═══════════════════════════════════════════════
       ADMIN DASHBOARD — FULL AUTO UPDATE
       Fixed: pause state preserved on refresh
    ═══════════════════════════════════════════════ */

    var socket = io();

    socket.on('connect', function() {
        showToast('🔌', 'Connected',
            'Live updates active', '#e11d48');
    });

    socket.on('disconnect', function() {
        showToast('⚠️', 'Disconnected',
            'Reconnecting...', '#d97706');
    });

    socket.on('queue_status_changed', function(data) {
        showToast(
            data.status === 'closed' ? '🔴' :
            data.status === 'paused' ? '⏸' : '▶',
            'Queue ' + data.status,
            data.dept + ' is now ' + data.status,
            data.status === 'closed' ? '#e11d48' :
            data.status === 'paused' ? '#d97706' : '#059669'
        );
        refreshAll();
    });

    socket.on('next_token', function(data) {
        showToast('📢', 'Token Called',
            'Now serving ' + data.token_number, '#e11d48');
        refreshAll();
    });

    socket.on('queue_update', function() {
        refreshStats();
        refreshTokenTable();
    });

    /* ── Update single dept card status instantly ── */
    function updateDeptCard(queueId, newStatus) {
        var card = document.getElementById('dcc-' + queueId);
        if (!card) return;

        var badge = card.querySelector('.dcc-badge');
        if (badge) {
            badge.className = 'dcc-badge dcc-badge-' + newStatus;
            badge.textContent = newStatus;
        }

        var pauseBtn = document.getElementById(
            'pause-btn-' + queueId
        );
        if (pauseBtn) {
            pauseBtn.textContent = newStatus === 'paused' ?
                '▶ Resume' : '⏸ Pause';
        }

        var closeBtn = card.querySelector('.dcc-close');
        if (closeBtn) {
            closeBtn.disabled = newStatus === 'closed';
        }

        card.style.opacity = newStatus === 'closed' ? '0.55' : '1';
        card.style.transition = 'opacity 0.4s ease';

        /* Update data attribute so future renders use correct status */
        card.setAttribute('data-status', newStatus);
    }

    /* ── Render ALL dept cards from API data ── */
    function renderDeptCards(data) {
        var grid = document.getElementById('dept-controls-grid');
        if (!grid) return;

        var icons = {
            'OPD': '🏥',
            'Pharmacy': '💊',
            'Laboratory': '🧪',
            'Radiology': '🩻',
            'Emergency': '🚨',
            'Cardiology': '❤️',
            'Pediatrics': '👶',
            'Billing': '💳'
        };

        var html = '';
        data.forEach(function(q, idx) {
            var icon = icons[q.department_name] || '🏥';
            var opacity = q.status === 'closed' ? '0.55' : '1';
            var serving = q.serving_token ?
                '🟢 Now Serving: ' + q.serving_token :
                'No token serving currently';
            var pauseLabel = q.status === 'paused' ?
                '▶ Resume' : '⏸ Pause';
            var closedDisabled = q.status === 'closed' ?
                ' disabled' : '';

            html +=
                '<div class="dept-control-card dcc-' + (idx + 1) + '"' +
                ' id="dcc-' + q.id + '"' +
                ' data-qid="' + q.id + '"' +
                ' data-status="' + q.status + '"' +
                ' style="opacity:' + opacity + ';' +
                'transition:opacity 0.4s ease">'

            +
            '<div class="dcc-header">' +
            '<span class="dcc-name">' +
            icon + ' ' + q.department_name +
                '</span>' +
                '<span class="dcc-badge dcc-badge-' + q.status + '">' +
                q.status +
                '</span>' +
                '</div>'

            +
            '<div class="dcc-stats">' +
            '<span id="dcc-wait-' + q.id + '">' +
                q.waiting_count +
                '</span> waiting' +
                '</div>'

            +
            '<div class="dcc-serving"' +
            ' id="serving-' + q.id + '">' +
                serving +
                '</div>'

            +
            '<div class="dcc-actions">' +
            '<button class="btn btn-primary dcc-next">' +
            '⏭ Next Token' +
            '</button>' +
            '<button class="btn btn-ghost dcc-pause"' +
            ' id="pause-btn-' + q.id + '">' +
                pauseLabel +
                '</button>' +
                '<button class="btn btn-danger dcc-close"' +
                closedDisabled + '>' +
                '✕ Close' +
                '</button>' +
                '</div>'

            +
            '</div>';
        });

        grid.innerHTML = html;
        attachDeptEvents();
    }

    /* ── Attach button events ── */
    function attachDeptEvents() {
        document.querySelectorAll('.dcc-next').forEach(
            function(btn) {
                btn.addEventListener('click', function() {
                    var qid = btn.closest('[data-qid]')
                        .getAttribute('data-qid');
                    callNext(parseInt(qid, 10));
                });
            }
        );

        document.querySelectorAll('.dcc-pause').forEach(
            function(btn) {
                btn.addEventListener('click', function() {
                    var qid = btn.closest('[data-qid]')
                        .getAttribute('data-qid');
                    pauseQueue(parseInt(qid, 10));
                });
            }
        );

        document.querySelectorAll('.dcc-close').forEach(
            function(btn) {
                btn.addEventListener('click', function() {
                    var qid = btn.closest('[data-qid]')
                        .getAttribute('data-qid');
                    closeQueueDept(parseInt(qid, 10));
                });
            }
        );
    }

    /* ── Render token table ── */
    function renderTokenTable(tokens) {
        var tbody = document.getElementById('admin-tbody');
        if (!tbody) return;

        if (!tokens || tokens.length === 0) {
            tbody.innerHTML =
                '<tr><td colspan="6" class="empty-row">' +
                'No tokens found.' +
                '</td></tr>';
            return;
        }

        var filter = '';
        var searchEl = document.getElementById('token-search');
        if (searchEl) filter = searchEl.value.toLowerCase();

        var html = '';
        tokens.forEach(function(t, idx) {
            if (filter &&
                !JSON.stringify(t).toLowerCase().includes(filter)) {
                return;
            }
            html +=
                '<tr style="animation:fadeRowIn 0.3s ease ' +
                (idx * 0.04) + 's both">' +
                '<td>' +
                '<span class="token-chip chip-rose">' +
                t.token_number +
                '</span></td>' +
                '<td>' + t.user_name + '</td>' +
                '<td>' + t.dept_name + '</td>' +
                '<td>' +
                '<span class="status-badge s-' + t.status + '">' +
                t.status +
                '</span></td>' +
                '<td class="text-muted">' + t.created_at + '</td>' +
                '<td class="text-rose">' + t.est_wait + '</td>' +
                '</tr>';
        });

        tbody.innerHTML = html ||
            '<tr><td colspan="6" class="empty-row">' +
            'No matching tokens.</td></tr>';
    }

    /* ── Update stats only ── */
    function refreshStats() {
        fetch('/admin/stats')
            .then(function(r) {
                return r.json();
            })
            .then(function(data) {
                updateStats(data);
            })
            .catch(function() {});
    }

    /* ── Update token table only ── */
    function refreshTokenTable() {
        fetch('/admin/token-list')
            .then(function(r) {
                return r.json();
            })
            .then(function(data) {
                renderTokenTable(data);
            })
            .catch(function() {});
    }

    /* ── Update stat numbers ── */
    function updateStats(data) {
        var fields = {
            'stat-total': data.total,
            'stat-waiting': data.waiting,
            'stat-completed': data.completed,
            'stat-cancelled': data.cancelled
        };
        Object.keys(fields).forEach(function(id) {
            var el = document.getElementById(id);
            if (el && el.textContent != fields[id]) {
                el.textContent = fields[id];
                el.style.transition = 'transform 0.2s ease';
                el.style.transform = 'scale(1.15)';
                setTimeout(function() {
                    el.style.transform = 'scale(1)';
                }, 200);
            }
        });

        var now = new Date();
        var lu = document.getElementById('last-updated');
        if (lu) {
            lu.innerHTML =
                'Real-time control &nbsp;•&nbsp;' +
                '<span style="color:var(--rose);font-weight:600">' +
                ' ⚡ Updated ' + now.toLocaleTimeString() +
                '</span>';
        }
    }

    /* ── MAIN REFRESH — reads DB status correctly ── */
    function refreshAll() {
        /* Refresh dept cards with REAL status from DB */
        fetch('/admin/queue-list')
            .then(function(r) {
                return r.json();
            })
            .then(function(data) {
                renderDeptCards(data);
            })
            .catch(function() {});

        /* Refresh token table */
        refreshTokenTable();

        /* Refresh stats */
        refreshStats();
    }

    /* ── Force refresh button ── */
    function forceRefresh() {
        refreshAll();
        showToast('🔄', 'Refreshed',
            'Dashboard updated', '#059669');
    }

    /* ── CALL NEXT ── */
    function callNext(queueId) {
        fetch('/admin/next-token/' + queueId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(function(r) {
                return r.json();
            })
            .then(function(d) {
                if (d.success) {
                    showToast('📢', 'Called!',
                        'Now serving ' + d.token.token_number, '#e11d48');
                    var el = document.getElementById(
                        'serving-' + queueId
                    );
                    if (el) {
                        el.innerHTML =
                            '<span style="color:#059669;font-weight:600">' +
                            '🟢 Now Serving: ' +
                            d.token.token_number +
                            '</span>';
                    }
                    refreshStats();
                    refreshTokenTable();
                } else {
                    showToast('ℹ️', 'Empty', d.message, '#64748b');
                }
            })
            .catch(function() {
                showToast('❌', 'Error',
                    'Could not call next token', '#e11d48');
            });
    }

    /* ── PAUSE QUEUE ── */
    function pauseQueue(queueId) {
        /* Disable button immediately to prevent double click */
        var btn = document.getElementById('pause-btn-' + queueId);
        if (btn) btn.disabled = true;

        fetch('/admin/pause-queue/' + queueId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(function(r) {
                return r.json();
            })
            .then(function(d) {
                /* Update card immediately with real status from server */
                updateDeptCard(queueId, d.status);

                /* Re-enable button */
                if (btn) btn.disabled = false;

                showToast(
                    d.status === 'paused' ? '⏸' : '▶',
                    'Queue ' + d.status,
                    'Department is now ' + d.status,
                    d.status === 'paused' ? '#d97706' : '#059669'
                );
            })
            .catch(function() {
                if (btn) btn.disabled = false;
                showToast('❌', 'Error',
                    'Could not update queue', '#e11d48');
            });
    }

    /* ── CLOSE QUEUE ── */
    function closeQueueDept(queueId) {
        if (!confirm(
                'Close this queue? All waiting patients will be affected.'
            )) return;

        fetch('/admin/close-queue/' + queueId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(function(r) {
                return r.json();
            })
            .then(function() {
                updateDeptCard(queueId, 'closed');
                showToast('🔴', 'Queue Closed',
                    'Department queue is now closed', '#e11d48');
                refreshStats();
            })
            .catch(function() {
                showToast('❌', 'Error',
                    'Could not close queue', '#e11d48');
            });
    }

    /* ── EXPORT ── */
    function exportReport() {
        showToast('📊', 'Exporting',
            'Generating report...', '#1d4ed8');
    }

    /* ── SECTION SWITCHER ── */
    function switchNav(el, name) {
        document.querySelectorAll('.nav-item').forEach(
            function(n) {
                n.classList.remove('active');
            }
        );
        el.classList.add('active');

        var ids = ['dashboard', 'depts', 'tokens', 'analytics'];
        ids.forEach(function(id) {
            var sec = document.getElementById('section-' + id);
            if (!sec) return;
            sec.style.display = (id === name) ? 'block' : 'none';
        });

        if (name === 'analytics') loadCharts();
        if (name === 'tokens') refreshTokenTable();
    }

    /* ── SEARCH FILTER ── */
    document.addEventListener('DOMContentLoaded', function() {
        var searchInput = document.getElementById('token-search');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                refreshTokenTable();
            });
        }
    });

    /* ── CHARTS ── */
    var chartsLoaded = false;

    function loadCharts() {
        if (chartsLoaded) return;
        chartsLoaded = true;

        fetch('/admin/analytics')
            .then(function(r) {
                return r.json();
            })
            .then(function(data) {
                var labels = [];
                var totals = [];
                var done = [];
                var cancels = [];

                data.forEach(function(d) {
                    labels.push(d.dept);
                    totals.push(d.total);
                    done.push(d.completed);
                    cancels.push(d.cancelled);
                });

                var barEl = document.getElementById('deptChart');
                if (barEl) {
                    new Chart(barEl, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Total',
                                data: totals,
                                backgroundColor: 'rgba(225,29,72,0.7)',
                                borderRadius: 8
                            }, {
                                label: 'Completed',
                                data: done,
                                backgroundColor: 'rgba(16,185,129,0.7)',
                                borderRadius: 8
                            }, {
                                label: 'Cancelled',
                                data: cancels,
                                backgroundColor: 'rgba(251,113,133,0.6)',
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#44333a'
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    ticks: {
                                        color: '#9c7b85'
                                    },
                                    grid: {
                                        color: 'rgba(225,29,72,0.06)'
                                    }
                                },
                                y: {
                                    ticks: {
                                        color: '#9c7b85'
                                    },
                                    grid: {
                                        color: 'rgba(225,29,72,0.06)'
                                    }
                                }
                            }
                        }
                    });
                }

                var td = 0;
                var tc = 0;
                var ta = 0;
                done.forEach(function(v) {
                    td += v;
                });
                cancels.forEach(function(v) {
                    tc += v;
                });
                totals.forEach(function(v) {
                    ta += v;
                });

                var doughEl = document.getElementById('statusChart');
                if (doughEl) {
                    new Chart(doughEl, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completed', 'Waiting', 'Cancelled'],
                            datasets: [{
                                data: [td, ta - td - tc, tc],
                                backgroundColor: [
                                    '#10b981', '#e11d48', '#fb7185'
                                ],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            cutout: '70%',
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#44333a'
                                    }
                                }
                            }
                        }
                    });
                }
            })
            .catch(function() {});
    }

    /* ── INIT ── */
    /* Load everything on page load */
    refreshAll();

    /* 
      KEY FIX:
      Refresh stats and tokens every 5 seconds
      BUT only refresh dept cards every 30 seconds
      This prevents pause state from being overwritten
    */
    setInterval(function() {
        refreshStats();
        refreshTokenTable();
    }, 5000);

    /* Dept cards refresh less frequently */
    setInterval(function() {
        refreshAll();
    }, 30000);
</script>
